# ============================================================
# dbt_project.yml
# Description: Core dbt project configuration for AnalyticsForge
# Author:      Tarun Nichwani
# ============================================================

name: 'analyticsforge'
version: '1.0.0'
config-version: 2

# Profile must match the name in profiles.yml
profile: 'analyticsforge'

# Directory configuration
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ── Materialization strategy per layer ───────────────────────
# staging  → views   (lightweight, no storage cost)
# intermediate → views (transitional, no need to materialize)
# marts    → tables  (queried by BI tools, needs to be fast)

models:
  analyticsforge:
    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging']
    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ['intermediate']
    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts']
      commerce:
        +tags: ['commerce', 'daily']
        +meta:
          owner: 'Tarun Nichwani'
          domain: 'commerce'
          tier: 'gold'
      tpch:
        +tags: ['tpch']
        +meta:
          owner: 'Tarun Nichwani'
          domain: 'tpch'
          tier: 'gold'

seeds:
  analyticsforge:
    +schema: seeds

snapshots:
  analyticsforge:
    +schema: snapshots
