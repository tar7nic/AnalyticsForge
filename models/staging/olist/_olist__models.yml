version: 2

models:
  - name: stg_olist__orders
    description: "Cleaned and typed staging model for Olist orders. One row per order."
    columns:
      - name: order_id
        description: "Unique identifier for each order. Natural key from source."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to stg_olist__customers."
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order."
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable',
                       'invoiced', 'processing', 'created', 'approved']
      - name: order_purchased_at
        description: "Timestamp when customer placed the order."
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp when this row was loaded by dbt."
        tests:
          - not_null

  - name: stg_olist__order_items
    description: "Cleaned staging model for order line items. One row per item per order."
    columns:
      - name: order_id
        description: "FK to stg_olist__orders."
        tests:
          - not_null
      - name: order_item_id
        description: "Sequential item number within an order."
        tests:
          - not_null
      - name: product_id
        description: "FK to stg_olist__products."
        tests:
          - not_null
      - name: seller_id
        description: "FK to stg_olist__sellers."
        tests:
          - not_null
      - name: item_price
        description: "Price of the individual item in BRL."
        tests:
          - not_null
      - name: freight_value
        description: "Freight cost for the individual item in BRL."
        tests:
          - not_null

  - name: stg_olist__order_payments
    description: "Cleaned staging model for order payments. One row per payment installment."
    columns:
      - name: order_id
        description: "FK to stg_olist__orders."
        tests:
          - not_null
      - name: payment_type
        description: "Payment method used by customer."
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_value
        description: "Value of this payment installment in BRL."
        tests:
          - not_null

  - name: stg_olist__order_reviews
    description: "Cleaned staging model for customer reviews. One row per review."
    columns:
      - name: review_id
        description: "Unique identifier for each review."
        tests:
          - not_null
      - name: order_id
        description: "FK to stg_olist__orders."
        tests:
          - not_null
      - name: review_score
        description: "Customer rating from 1 to 5."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_olist__customers
    description: "Cleaned staging model for customers. One row per customer_id."
    columns:
      - name: customer_id
        description: "Unique identifier per order — not unique per person."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True unique customer identifier across multiple orders."
        tests:
          - not_null
      - name: customer_state
        description: "Two-letter Brazilian state code."
        tests:
          - not_null

  - name: stg_olist__sellers
    description: "Cleaned staging model for sellers. One row per seller."
    columns:
      - name: seller_id
        description: "Unique identifier for each seller."
        tests:
          - unique
          - not_null
      - name: seller_state
        description: "Two-letter Brazilian state code."
        tests:
          - not_null

  - name: stg_olist__products
    description: "Cleaned staging model for products with English category names."
    columns:
      - name: product_id
        description: "Unique identifier for each product."
        tests:
          - unique
          - not_null
      - name: product_category_english
        description: "Product category name translated to English."
        tests:
          - not_null
      - name: product_volume_cm3
        description: "Derived field — length x height x width in cubic centimeters."

  - name: stg_olist__geolocation
    description: "Cleaned staging model for zip code to coordinate mapping."
    columns:
      - name: zip_code
        description: "First 5 digits of Brazilian zip code."
        tests:
          - not_null
      - name: latitude
        description: "Latitude coordinate for this zip code."
      - name: longitude
        description: "Longitude coordinate for this zip code."
