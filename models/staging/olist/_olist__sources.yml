version: 2

sources:
  - name: olist
    description: "Raw Olist Brazilian E-Commerce data loaded from Kaggle CSVs into Snowflake RAW.OLIST schema."
    database: RAW
    schema: OLIST
    loader: python_ingestion
    loaded_at_field: null

    freshness:
      warn_after: {count: 7, period: day}
      error_after: {count: 30, period: day}

    tables:
      - name: orders
        description: "One row per order. Contains order status and all timestamps."
        columns:
          - name: ORDER_ID
            description: "Unique identifier for each order."
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            description: "FK to customers table."
            tests:
              - not_null
          - name: ORDER_STATUS
            description: "Current status of the order."
            tests:
              - not_null
              - accepted_values:
                  values: ['delivered', 'shipped', 'canceled', 'unavailable',
                           'invoiced', 'processing', 'created', 'approved']

      - name: order_items
        description: "One row per item within an order. An order can have multiple items."
        columns:
          - name: ORDER_ID
            description: "FK to orders table."
            tests:
              - not_null
          - name: ORDER_ITEM_ID
            description: "Sequential item number within an order."
            tests:
              - not_null
          - name: PRODUCT_ID
            description: "FK to products table."
            tests:
              - not_null
          - name: SELLER_ID
            description: "FK to sellers table."
            tests:
              - not_null

      - name: order_payments
        description: "One row per payment installment. An order can have multiple payment rows."
        columns:
          - name: ORDER_ID
            description: "FK to orders table."
            tests:
              - not_null
          - name: PAYMENT_TYPE
            description: "Payment method used."
            tests:
              - not_null
              - accepted_values:
                  values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

      - name: order_reviews
        description: "Customer reviews submitted after order delivery."
        columns:
          - name: REVIEW_ID
            description: "Unique identifier for each review."
            tests:
              - not_null
          - name: ORDER_ID
            description: "FK to orders table."
            tests:
              - not_null
          - name: REVIEW_SCORE
            description: "Rating given by customer from 1 to 5."
            tests:
              - not_null
              - accepted_values:
                  values: ['1', '2', '3', '4', '5']

      - name: customers
        description: "One row per customer. Contains location information."
        columns:
          - name: CUSTOMER_ID
            description: "Unique identifier for each customer."
            tests:
              - unique
              - not_null
          - name: CUSTOMER_UNIQUE_ID
            description: "Unique identifier that persists across multiple orders."
            tests:
              - not_null

      - name: sellers
        description: "One row per seller. Contains seller location information."
        columns:
          - name: SELLER_ID
            description: "Unique identifier for each seller."
            tests:
              - unique
              - not_null

      - name: products
        description: "One row per product. Contains category and physical dimensions."
        columns:
          - name: PRODUCT_ID
            description: "Unique identifier for each product."
            tests:
              - unique
              - not_null

      - name: geolocation
        description: "Maps Brazilian zip codes to latitude, longitude, city and state."
        columns:
          - name: GEOLOCATION_ZIP_CODE_PREFIX
            description: "First 5 digits of Brazilian zip code."
            tests:
              - not_null

      - name: product_category_name_translation
        description: "Maps Portuguese product category names to English equivalents."
        columns:
          - name: PRODUCT_CATEGORY_NAME
            description: "Category name in Portuguese."
            tests:
              - unique
              - not_null
